<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Combo Offers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="product-section">
        <h2>Special Combo Offers</h2>

        <div class="product">
            <div class="card">
                <img src="images/Combo1.jpeg"alt="Corn Combo">
                <h3>Corn + Onion Combo</h3>
                <p class="price">
                    <span class="old-price">Rs.650</span>
                    <span class="new-price">Rs.500</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Combo2.jpeg" alt="Fruit Combo">
                <h3>Banana + Tomato Combo</h3>
                <p class="price">
                    <span class="old-price">Rs.300</span>
                    <span class="new-price">Rs.220</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Combo3.jpeg"alt="Healthy Combo">
                <h3>Finger Millet + Paddy Combo </h3>
                <p class="price">
                    <span class="old-price">Rs.400</span>
                    <span class="new-price">Rs.320</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Combo4.jpeg" alt="Jackfruit">
                <h3>Jackfruit + Onion Combo</h3>
                <p class="price">
                    <span class="old-price">Rs.250</span>
                    <span class="new-price">Rs.180</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>
        </div>
    </section>

</body>
</html>
