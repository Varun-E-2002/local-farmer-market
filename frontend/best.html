<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Selling Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="product-section">
        <h2>Best Selling Products</h2>

        <div class="product">
            <div class="card">
                <img src="cornsale.jpg" alt="Corn">
                <h3>Corn (1kg)</h3>
                <p class="price">
                    <span class="old-price">Rs.550</span>
                    <span class="new-price">Rs.450</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="onionsale.jfif" alt="Onion">
                <h3>Onion (1kg)</h3>
                <p class="price">
                    <span class="old-price">Rs.100</span>
                    <span class="new-price">Rs.60</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="vaalaisale.jpeg" alt="Banana">
                <h3>Banana</h3>
                <p class="price">
                    <span class="old-price">Rs.150</span>
                    <span class="new-price">Rs.100</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="karumbusale.jfif" alt="Sugarcane">
                <h3>Sugarcane</h3>
                <p class="price">
                    <span class="old-price">Rs.300</span>
                    <span class="new-price">Rs.250</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>
        </div>
    </section>

</body>
</html>
