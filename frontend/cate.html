<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Categories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>All Categories</h1>
    </header>

    <section class="product-section">
        <h2>Our Categories</h2>
        <div class="product">
            <div class="card">
                <img src="images/Corn1.jpg" alt="Corn">
                <h3>Corn</h3>
                <p class="price">
                    <span class="old-price">Rs.300</span>
                    <span class="new-price">Rs.20</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Onion1.jfif" alt="Onion">
                <h3>Onion</h3>
                <p class="price">
                    <span class="old-price">Rs.100</span>
                    <span class="new-price">Rs.50</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Paddy1.webp" alt="Paddy">
                <h3>Paddy</h3>
                <p class="price">
                    <span class="old-price">Rs.100</span>
                    <span class="new-price">Rs.90</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>

            <div class="card">
                <img src="images/Tomato1.webp" alt="Tomato">
                <h3>Tomato</h3>
                <p class="price">
                    <span class="old-price">Rs.100</span>
                    <span class="new-price">Rs.60</span>
                </p>
                <p class="rating">⭐⭐⭐⭐⭐</p>
            </div>
        </div>
    </section>
</body>
</html>
